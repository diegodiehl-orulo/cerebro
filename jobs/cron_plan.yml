# RESUMO DE STATUS E ORDEM DE ATIVAÇÃO — atualizado em 2026-04-17
# (reconciliado com ESTADO_DO_SISTEMA.md após Onda 5 de limpeza)
# ══════════════════════════════════════════════════════════════════
#
# | Job                          | Frequência          | Status                     |
# |------------------------------|---------------------|----------------------------|
# | pracas-sprint-reminder-thu   | Quinta 09:00        | REMOVIDO ❌ (Onda 5)        |
# | pracas-sprint-check-mon      | Segunda 18:00       | REMOVIDO ❌ (Onda 5)        |
# | pracas-sprint-check-tue-10   | Terça 10:00         | ATIVO ✅                   |
# | pracas-sprint-on-receive     | MANUAL              | PRONTO (sem cron)          |
# | pracas-sprint-checkin-ter    | Terça 09:00         | PENDENTE (pós 1º sprint)   |
# | pracas-sprint-checkin-sex    | Sexta 09:00         | PENDENTE (pós 1º sprint)   |
# | pracas-weekly-scan           | Segunda 08:30       | DESATIVADO ⚫ (substituído) |
# | pracas-sprint-followup-track | D+3 por sprint (at) | PENDENTE (por sprint)      |
# | pracas-pulse-2xweek          | Ter+Sex 09:00       | ATIVO ✅                   |
# | pracas-sprint-watcher        | 2h seg-sex 08-20h   | ATIVO ✅                   |
# | sprint-email-watcher-mon-tue | 2h seg-ter 08-20h   | REMOVIDO ❌ (Onda 5)        |
# | pracas-checkin-wed-09        | Quarta 09:00        | ATIVO ✅                   |
# | pracas-checkin-fri-11        | Sexta 11:00         | REMOVIDO ❌ (Onda 5)        |
#
# ORDEM SUGERIDA:
# 1. pracas-weekly-scan          → visão geral imediata
# 2. pracas-sprint-reminder-thu  → primeiro lembrete quinzenal
# 3. pracas-sprint-check-mon     → fechamento do prazo
# 4. pracas-sprint-check-tue-10  → alerta final
# 5. pracas-sprint-checkin-ter + sex → após 1º sprint validado
# 6. pracas-sprint-followup-tracker  → configurar por sprint
#
# NOTAS:
# - Jobs 7 (weekly-scan) e 2 (check-mon) rodam na segunda mas em horários diferentes
#   (08:30 e 18:00) — sem conflito. weekly-scan é visão geral; check-mon é específico.
# - Jobs 3 (check-tue-10) e 5 (checkin-ter) rodam na terça em horários diferentes
#   (10:00 e 09:00) — sem conflito. check-tue-10 é sobre one-pager; checkin-ter é sobre sprint.
# - Lara: @larissa_personal_assistant_bot (Telegram)
# - CC padrão: Gustavo Torres <gustavo.torres@orulo.com.br>

  # ══════════════════════════════════════════════════════════════════
  # BLOCO 4 — WATCHERS (e-mail + tl;dv)
  # ══════════════════════════════════════════════════════════════════

  # ─── JOB: SPRINT WATCHER (e-mail + tl;dv combinado) ─────────────
  # Roda a cada 2h em dias úteis, 08h–20h.
  # Detecta e-mail de One-Pager OU reunião tl;dv com sócio local.
  # Fonte dos dados: Diego envia aqui OU e-mail detectado.
  - name: pracas-sprint-watcher
    description: "Watcher 2h — detecta e-mail de sprint + reunião tl;dv com sócio. Alerta Diego."
    status: ATIVO ✅
    jobId: "7a3dc77c-d2ca-47a0-a08c-a642c506c67a"

    schedule:
      kind: cron
      expr: "0 8,10,12,14,16,18,20 * * 1-5"   # cada 2h, seg-sex, 08h–20h BRT
      tz: America/Sao_Paulo

    scripts:
      - scripts/sprint_email_watcher.py    # detecta e-mail de One-Pager
      - scripts/tldv_socio_check.py        # detecta reunião tl;dv com sócio local

    prompts:
      - jobs/prompts/pracas_sprint_email_watcher.txt
      - jobs/prompts/pracas_tldv_socio_detector.txt

    payload:
      kind: agentTurn
      note: "Ver payload completo no jobId acima"
      timeoutSeconds: 90

    sessionTarget: isolated
    delivery:
      mode: announce
      channel: telegram
      to: "8671853499"

