# jobs/cron_plan.yml
# Plano de Jobs: Governança de Praças — Sprint Quinzenal
# Sistema: Órulo | Versão: 2.0 (unificado) | Criado: 2026-03
# Timezone: America/Sao_Paulo (BRT)
# Governance: governance/pracas_sprint.md
#
# ─── REGRAS GLOBAIS DE SEGURANÇA ──────────────────────────────────────
# - Nenhum job envia e-mail automaticamente.
# - Alertas Telegram para Diego: automáticos (são internos).
# - Todo e-mail: rascunho + "INSTRUÇÕES PARA LARA" + "OK para enviar?".
# - Instruções para Lara: enviar via @larissa_personal_assistant_bot.
# - Não inventar dados: usar [PREENCHER] quando faltar.
# ──────────────────────────────────────────────────────────────────────
#
# STATUS: Todos PENDENTES de ativação.
# Ativar com: "OK para ativar [nome]" → Morfeu cria via cron tool.
# Registrar jobId gerado aqui após ativar.

---

jobs:

  # ══════════════════════════════════════════════════════════════════
  # BLOCO 1 — COLETA DO ONE-PAGER (ciclo quinzenal)
  # ══════════════════════════════════════════════════════════════════

  # ─── JOB 1: LEMBRETE DE QUINTA ────────────────────────────────────
  # D-4 antes da segunda EOD. Roda toda quinta; o prompt decide se é
  # semana de sprint ou não.
  - name: pracas-sprint-reminder-thu
    description: "Lembrete quinzenal — One-Pager esperado até segunda EOD"
    status: REMOVIDO ❌  # Onda 5 (2026-03-28) — timeout crônico 120s
    jobId: "39e87458-f1bc-493c-acf1-6f7503537f5e"
    removed_date: "2026-03-28"
    removed_reason: "Timeout crônico 120s — dependia de OAuth interativo"

    schedule:
      kind: cron
      expr: "0 9 * * THU"
      tz: America/Sao_Paulo

    payload:
      kind: agentTurn
      message: |
        Executar job: pracas_sprint_reminder_thu
        Prompt em: jobs/prompts/pracas_sprint_reminder_thu.txt

        ENTRADAS:
        - PRAÇA_1: Curitiba | SOCIO_1: Zanella | EMAIL_1: luiz.zanella@orulo.com.br
        - PRAÇA_2: Vitória | SOCIO_2: Pedro Kneip | EMAIL_2: pkneip@orulo.com.br
        - PERIODO_SPRINT: [PREENCHER — ler de memory/projects_orulo.md]
        - SPRINT_NUM: [PREENCHER — ler de memory/projects_orulo.md]

        Canal Lara: @larissa_personal_assistant_bot
        CC padrão: gustavo.torres@orulo.com.br
        Não enviar nada. Gerar rascunho + Instruções Lara + pedir OK.
      timeoutSeconds: 120

    sessionTarget: isolated
    delivery:
      mode: announce

  # ─── JOB 2: CHECAGEM DE SEGUNDA (18:00) ───────────────────────────
  # Pergunta a Diego quais One-Pagers chegaram. Gera pré-alertas prontos.
  - name: pracas-sprint-check-mon
    description: "Checagem segunda 18h — recebido? Se não → pré-alerta gerado"
    status: REMOVIDO ❌  # Onda 5 (2026-03-28) — timeout crônico 180s
    jobId: "1a8a8f9a-6d03-4533-9007-b15b7f5ba3f5"
    removed_date: "2026-03-28"
    removed_reason: "Timeout crônico 180s — excedia SLA do plano Starter"

    schedule:
      kind: cron
      expr: "0 18 * * MON"
      tz: America/Sao_Paulo

    payload:
      kind: agentTurn
      message: |
        Executar job: pracas_sprint_check_mon
        Prompt em: jobs/prompts/pracas_sprint_check_mon.txt

        ENTRADAS:
        - PRAÇA_1: Curitiba | SOCIO_1: Zanella | EMAIL_1: luiz.zanella@orulo.com.br
        - PRAÇA_2: Vitória | SOCIO_2: Pedro Kneip | EMAIL_2: pkneip@orulo.com.br
        - SPRINT_NUM: [PREENCHER — ler de memory/projects_orulo.md]
        - PERIODO_SPRINT: [PREENCHER — ler de memory/projects_orulo.md]

        Canal Lara: @larissa_personal_assistant_bot
        CC padrão: gustavo.torres@orulo.com.br
        Telegram para Diego: automático (interno).
        E-mails de pré-alerta: apenas rascunho, aguardar OK.
      timeoutSeconds: 120

    sessionTarget: isolated
    delivery:
      mode: announce

  # ─── JOB 3: ALERTA DE TERÇA (10:00) ──────────────────────────────
  # One-Pager ainda ausente D+1. Alerta Telegram automático + cobrança firme.
  - name: pracas-sprint-check-tue-10
    description: "Alerta terça 10h — ausência crítica. Telegram + cobrança firme para Lara."
    status: ATIVO ✅
    jobId: "3a13d632-3620-4686-b69e-6507e192a17a"

    schedule:
      kind: cron
      expr: "0 10 * * TUE"
      tz: America/Sao_Paulo

    payload:
      kind: agentTurn
      message: |
        Executar job: pracas_sprint_check_tue_10
        Prompt em: jobs/prompts/pracas_sprint_check_tue_10.txt

        ENTRADAS:
        - PRAÇA_1: Curitiba | SOCIO_1: Zanella | EMAIL_1: luiz.zanella@orulo.com.br
        - PRAÇA_2: Vitória | SOCIO_2: Pedro Kneip | EMAIL_2: pkneip@orulo.com.br
        - SPRINT_NUM: [PREENCHER — ler de memory/projects_orulo.md]
        - PERIODO_SPRINT: [PREENCHER — ler de memory/projects_orulo.md]
        - STATUS_RECEBIMENTO: [ler resposta do Job 2 em pending.md ou assumir ambas pendentes]

        Canal Lara: @larissa_personal_assistant_bot
        CC padrão: gustavo.torres@orulo.com.br
        Telegram para Diego: automático (interno).
        E-mails de cobrança: apenas rascunho, aguardar OK.
      timeoutSeconds: 120

    sessionTarget: isolated
    delivery:
      mode: announce

  # ─── JOB 4: ANÁLISE DO ONE-PAGER (ao receber) ────────────────────
  # Manual — Diego cola o e-mail na sessão do Morfeu.
  # Futuro: gatilho por leitura de inbox (integração a definir).
  - name: pracas-sprint-on-receive
    description: "Análise do One-Pager recebido — diagnóstico, contrato, retorno, memória"
    status: MANUAL (sem cron ativo)
    jobId: "N/A"

    schedule:
      kind: manual
      note: "Diego cola o e-mail do sócio local na sessão. Futuro: gatilho por inbox."

    payload:
      kind: agentTurn
      message: |
        Executar job: pracas_sprint_on_receive
        Prompt em: jobs/prompts/pracas_sprint_on_receive.txt

        ENTRADA: Diego colará o e-mail do sócio local nesta sessão.

        Saídas: Telegram (automático) + Diagnóstico + Rascunho de retorno (aguarda OK)
        + Atualização de memória (memory/projects_orulo.md + memory/pending.md)

        Canal Lara: @larissa_personal_assistant_bot
        CC padrão: gustavo.torres@orulo.com.br
      timeoutSeconds: 180

    sessionTarget: isolated
    delivery:
      mode: announce

  # ══════════════════════════════════════════════════════════════════
  # BLOCO 2 — CHECK-INS DURANTE O SPRINT (2x por semana)
  # Ativar após Diego validar o primeiro sprint.
  # ══════════════════════════════════════════════════════════════════

  # ─── JOB 5: CHECK-IN DE TERÇA (09:00) ────────────────────────────
  - name: pracas-sprint-checkin-ter
    description: "Check-in de terça 09h — Telegram para Diego com contexto + 4 perguntas + rascunho"
    status: PENDENTE (ativar após 1º sprint validado)
    jobId: "[gerado ao ativar]"

    schedule:
      kind: cron
      expr: "0 9 * * TUE"
      tz: America/Sao_Paulo

    payload:
      kind: agentTurn
      message: |
        Executar job: pracas_sprint_checkin_2xweek
        Prompt em: jobs/prompts/pracas_sprint_checkin_2xweek.txt

        ENTRADAS:
        - PRAÇA_1: Curitiba | SOCIO_1: Zanella | EMAIL_1: luiz.zanella@orulo.com.br
        - PRAÇA_2: Vitória | SOCIO_2: Pedro Kneip | EMAIL_2: pkneip@orulo.com.br
        - DIA_SEMANA: Terça
        - Demais dados: ler de memory/projects_orulo.md

        Canal Lara: @larissa_personal_assistant_bot
        Telegram para Diego: automático. Rascunho de mensagem: nunca automático.
      timeoutSeconds: 120

    sessionTarget: isolated
    delivery:
      mode: announce

  # ─── JOB 6: CHECK-IN DE SEXTA (09:00) ────────────────────────────
  - name: pracas-sprint-checkin-sex
    description: "Check-in de sexta 09h — Telegram para Diego com contexto + 4 perguntas + rascunho"
    status: PENDENTE (ativar após 1º sprint validado)
    jobId: "[gerado ao ativar]"

    schedule:
      kind: cron
      expr: "0 9 * * FRI"
      tz: America/Sao_Paulo

    payload:
      kind: agentTurn
      message: |
        Executar job: pracas_sprint_checkin_2xweek
        Prompt em: jobs/prompts/pracas_sprint_checkin_2xweek.txt

        ENTRADAS:
        - PRAÇA_1: Curitiba | SOCIO_1: Zanella | EMAIL_1: luiz.zanella@orulo.com.br
        - PRAÇA_2: Vitória | SOCIO_2: Pedro Kneip | EMAIL_2: pkneip@orulo.com.br
        - DIA_SEMANA: Sexta
        - Demais dados: ler de memory/projects_orulo.md

        Canal Lara: @larissa_personal_assistant_bot
        Telegram para Diego: automático. Rascunho de mensagem: nunca automático.
      timeoutSeconds: 120

    sessionTarget: isolated
    delivery:
      mode: announce

  # ══════════════════════════════════════════════════════════════════
  # BLOCO 3 — MONITORAMENTO E RASTREABILIDADE
  # ══════════════════════════════════════════════════════════════════

  # ─── JOB 7: WEEKLY SCAN (segunda 08:30) ──────────────────────────
  # Visão geral das praças antes da semana começar.
  # Roda ANTES do check-mon (18h) — sem conflito.
  - name: pracas-weekly-scan
    description: "Escaneamento semanal de praças — alertas de sprint/checkpoint/Matriz em aberto"
    status: DESATIVADO ⚫  # Onda 5 (2026-03-28) — substituído pelo pracas-pulse-2xweek
    jobId: "2688a54a-7744-4ed7-a142-a8e5eb736dea"
    disabled_date: "2026-03-28"
    disabled_reason: "Substituído por pracas-pulse-2xweek (b9726fbf) — rodada 2x/semana com mais contexto"

    schedule:
      kind: cron
      expr: "30 8 * * MON"
      tz: America/Sao_Paulo

    payload:
      kind: agentTurn
      message: |
        Executar job: praças_weekly_scan
        Prompt em: jobs/prompts/praças_weekly_scan.txt

        ENTRADAS: Ler memory/projects_orulo.md + governance/pracas_sprint.md

        Apenas alertas internos (Telegram para Diego). Sem rascunhos de e-mail.
      timeoutSeconds: 120

    sessionTarget: isolated
    delivery:
      mode: announce

  # ─── JOB 8: FOLLOW-UP TRACKER (D+3 após sprint) ──────────────────
  # Verificar se follow-ups da ata foram executados.
  # Configurar manualmente como job "at" após cada sprint fechado.
  - name: pracas-sprint-followup-tracker
    description: "D+3 após sprint — rastrear follow-ups abertos e alertar Diego"
    status: PENDENTE (configurar como 'at' após cada sprint)
    jobId: "[gerado ao ativar]"

    schedule:
      kind: at
      at: "[ISO timestamp D+3 da reunião — configurar por sprint]"
      note: "Ajustar manualmente a cada sprint. Ex: sprint fecha seg 10/03 → at: 2026-03-13T09:00:00-03:00"

    payload:
      kind: agentTurn
      message: |
        Executar job: sprint_followup_tracker
        Prompt em: jobs/prompts/sprint_followup_tracker.txt

        ENTRADAS: Ler memory/projects_orulo.md (follow-ups do sprint atual)

        Apenas alertas internos (Telegram para Diego).
        E-mails de cobrança: apenas se Diego aprovar.
        Canal Lara: @larissa_personal_assistant_bot
      timeoutSeconds: 120

    sessionTarget: isolated
    delivery:
      mode: announce

