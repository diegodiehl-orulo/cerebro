name: wkf_review_sprint_readout
description: Prepara e persiste o relatorio de revisao de sprint para uma praca.

inputs:
  - name: praca_id
    type: string
    description: "ID da praca (ex: CWB)."
  - name: current_period_start
    type: string
    description: "Data de inicio do periodo atual (YYYY-MM-DD)."
  - name: current_period_end
    type: string
    description: "Data de fim do periodo atual (YYYY-MM-DD)."
  - name: previous_period_start
    type: string
    description: "Data de inicio do periodo anterior para comparacao (YYYY-MM-DD)."
  - name: previous_period_end
    type: string
    description: "Data de fim do periodo anterior para comparacao (YYYY-MM-DD)."

steps:
  - id: get_context
    skill: skill_get_context_for_praca
    params:
      praca_id: "{{ inputs.praca_id }}"
  
  - id: collect_current
    skill: skill_collect_kpis_from_praca
    params:
      praca_id: "{{ inputs.praca_id }}"
      start_date: "{{ inputs.current_period_start }}"
      end_date: "{{ inputs.current_period_end }}"

  - id: collect_previous
    skill: skill_collect_kpis_from_praca
    params:
      praca_id: "{{ inputs.praca_id }}"
      start_date: "{{ inputs.previous_period_start }}"
      end_date: "{{ inputs.previous_period_end }}"

  - id: validate_current
    skill: skill_validate_kpi_data
    params:
      data: "{{ steps.collect_current.output }}"

  - id: validate_previous
    skill: skill_validate_kpi_data
    params:
      data: "{{ steps.collect_previous.output }}"

  - id: find_deviations
    skill: skill_identify_kpi_deviations
    params:
      current_kpis: "{{ steps.validate_current.output }}"
      previous_kpis: "{{ steps.validate_previous.output }}"

  - id: build_results
    skill: skill_build_sprint_results_for_praca
    params:
      context: "{{ steps.get_context.output }}"
      kpis: "{{ steps.validate_current.output }}"
      deviations: "{{ steps.find_deviations.output }}"
      sprint_period:
        start_date: "{{ inputs.current_period_start }}"
        end_date: "{{ inputs.current_period_end }}"

  - id: generate_md
    skill: skill_generate_onepager_for_sprint
    params:
      results: "{{ steps.build_results.output }}"

  - id: persist_report
    skill: skill_persist_artifact
    params:
      filepath: "reports/pracas/{{ inputs.praca_id }}_sprint_{{ inputs.current_period_end }}.md"
      content: "{{ steps.generate_md.output }}"
      overwrite: true

outputs:
  - name: report_filepath
    value: "{{ steps.persist_report.output }}"
